# Maps Anthropic-style model names (what Claude Code sends) to NVIDIA NIM IDs
# and capability flags. Lookup is exact-first, then prefix-match.
# Fallbacks honor ANTHROPIC_MODEL / ANTHROPIC_SMALL_FAST_MODEL.
defaults:
  big: "claude-opus-4-7"
  small: "claude-haiku-4-5"

router:
  default: "claude-opus-4-7"
  background: "claude-haiku-4-5"
  think: "claude-opus-4-7"
  long_context: "claude-sonnet-4-6"
  long_context_threshold: 128000
  vision: "claude-opus-4-7-vision"

aliases:
  # Default agentic/coding model on NVIDIA NIM → Qwen3 Coder 480B-A35B.
  # Qwen3.5 122B-A10B may be listed but can return DEGRADED function 400s.
  # Nemotron Ultra 253B is listed by /models but returns 404 for this account.
  claude-opus-4-7:
    nvidia_id: "qwen/qwen3-coder-480b-a35b-instruct"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "qwen-kwargs"
    max_context: 131072
    max_output: 16384
    failover_to:
      - "claude-sonnet-4-6"
      - "claude-qwen3-coder"
      - "claude-haiku-4-5"

  # The "Large" agentic powerhouse → DeepSeek V4 Flash.
  # Blazing fast MoE alternative for massive workloads.
  claude-sonnet-4-6:
    nvidia_id: "deepseek-ai/deepseek-v4-flash"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "always-on"
    max_context: 131072
    max_output: 16384
    failover_to:
      - "claude-haiku-4-5"

  # Fast, highly intelligent MoE → Kimi-2.6.
  # Optimized for long-horizon alignment and efficient reasoning.
  # Replaces Nemotron-3 Nano for 2026 flagship small model.
  claude-haiku-4-5:
    nvidia_id: "moonshotai/kimi-k2.6"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "slash-think"
    max_context: 262144
    max_output: 16384

  # High-performance agentic alternative → MiniMax-2.7.
  # Specifically tuned for coding agents and terminal-based debugging.
  claude-minimax:
    nvidia_id: "minimaxai/minimax-m2.7"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "detailed-thinking-v1"
    max_context: 204800
    max_output: 16384

  # Legacy/Alternative Powerhouse → Qwen3 Coder 480B.
  claude-qwen3-coder:
    nvidia_id: "qwen/qwen3-coder-480b-a35b-instruct"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "qwen-kwargs"
    max_context: 131072
    max_output: 16384

  # Vision-capable (Llama 4 Maverick)
  claude-opus-4-7-vision:
    nvidia_id: "meta/llama-4-maverick-17b-128e-instruct"
    supports_tools: true
    supports_vision: true
    supports_reasoning: false
    max_context: 131072
    max_output: 16384

  # Qwen3 with thinking kwargs
  claude-qwen3:
    nvidia_id: "qwen/qwen3-235b-a22b"
    supports_tools: true
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "qwen-kwargs"
    max_context: 131072
    max_output: 16384

  # DeepSeek reasoning (legacy R1)
  claude-r1:
    nvidia_id: "deepseek-ai/deepseek-r1"
    supports_tools: false
    supports_vision: false
    supports_reasoning: true
    reasoning_style: "always-on"
    temperature_override: 0.6
    max_context: 131072
    max_output: 16384

  # Plain Llama 3.3 (no reasoning)
  claude-llama-3-3:
    nvidia_id: "meta/llama-3.3-70b-instruct"
    supports_tools: true
    supports_vision: false
    supports_reasoning: false
    reasoning_style: "none"
    max_context: 131072
    max_output: 16384

prefix_fallbacks:
  "claude-3-5-sonnet": "claude-sonnet-4-6"
  "claude-3-7-sonnet": "claude-sonnet-4-6"
  "claude-sonnet-3":   "claude-sonnet-4-6"
  "claude-3-5-haiku":  "claude-haiku-4-5"
  "claude-haiku-3":    "claude-haiku-4-5"
  "claude-opus-4-6":     "claude-opus-4-7"
  "claude-3-opus":     "claude-opus-4-7"
  "claude-opus-3":     "claude-opus-4-7"
